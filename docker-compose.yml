# Local Postgres with the pgvector extension preinstalled.
#   docker compose up -d
#   npm run db:push
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: unified-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: unified
    ports:
      - "5432:5432"
    volumes:
      - unified_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d unified"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  unified_pg_data:
